@if (form) {
  <mat-card class="image-filters">
    <mat-card-content class="image-filters-content">
      <span class="h3 title">{{'filtersPanel.title' | translate}}</span>
      <form [formGroup]="form" class="image-filters-form">
        @for (group of filtersConfig; track group) {
          <app-filter-group [group]="group" [form]="form"></app-filter-group>
        }
      </form>
    </mat-card-content>
    <mat-card-actions class="actions">
      <button class="btn primary" (click)="applyFilters()" [disabled]="isDisabled()">{{"common.apply" |
      translate}}</button>
    </mat-card-actions>
  </mat-card>
}
